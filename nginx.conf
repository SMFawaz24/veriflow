# /etc/nginx/sites-available/veriflow.f4w4z.dev
#
# Prerequisites:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d veriflow.f4w4z.dev
#   sudo ln -s /etc/nginx/sites-available/veriflow.f4w4z.dev \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name veriflow.f4w4z.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name veriflow.f4w4z.dev;

    # ── TLS (filled in by certbot) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/veriflow.f4w4z.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veriflow.f4w4z.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SECURITY HEADERS ─────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy        "strict-origin"         always;
    add_header Permissions-Policy     "camera=(), microphone=()" always;

    # ── UPLOAD SIZE ──────────────────────────────────────
    client_max_body_size 105M;

    # ── STATIC FILES ─────────────────────────────────────
    root /var/www/veriflow;
    index index.html;

    location / {
        try_files $uri $uri/ @proxy;
    }

    # ── API PROXY → Node.js ──────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # ── CORS (handled by Express, but kept as fallback)
        add_header Access-Control-Allow-Origin  "https://veriflow.f4w4z.dev" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"                always;
        add_header Access-Control-Allow-Headers "Content-Type"                      always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ── SPA FALLBACK ─────────────────────────────────────
    location @proxy {
        proxy_pass http://127.0.0.1:3001;
    }

    # ── CACHE STATIC ASSETS ──────────────────────────────
    location ~* \.(js|css|woff2|png|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── GZIP ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/csv;
    gzip_min_length 1024;
}
